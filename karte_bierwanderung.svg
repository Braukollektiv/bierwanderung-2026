<text x="598" y="522" font-size="10" fill="#5a4a2a" text-anchor="middle">Badi Auslikon</text>

<!-- STATION 6 — Robenhauser -->
<circle cx="455" cy="680" r="22" fill="#7a2415" filter="url(#shadow)"/>
<circle cx="455" cy="680" r="22" fill="none" stroke="#fff" stroke-width="2.5"/>
<text x="455" y="687" font-size="17" fill="#fff" font-weight="800" text-anchor="middle">6</text>
<!-- Label -->
<rect x="483" y="658" width="170" height="48" rx="6" fill="white" opacity="0.88"/>
<text x="568" y="675" font-size="12" fill="#7a2415" font-weight="700" text-anchor="middle">Robenhauser Bräu</text>
<text x="568" y="692" font-size="10" fill="#5a4a2a" text-anchor="middle">Eichhölzliweg, Wetzikon</text>

<!-- STATION 7 — Braukollektiv -->
<circle cx="430" cy="862" r="22" fill="#7a2415" filter="url(#shadow)"/>
<circle cx="430" cy="862" r="22" fill="none" stroke="#fff" stroke-width="2.5"/>
<text x="430" y="869" font-size="17" fill="#fff" font-weight="800" text-anchor="middle">7</text>
<!-- Label -->
<rect x="458" y="840" width="195" height="52" rx="6" fill="white" opacity="0.88"/>
<text x="555" y="857" font-size="12" fill="#7a2415" font-weight="700" text-anchor="middle">Keller Bier / Braukollektiv</text>
<text x="555" y="873" font-size="10" fill="#5a4a2a" text-anchor="middle">FBW Areal, Wetzikon 🚩</text>
<text x="555" y="886" font-size="9" fill="#3d6b23" text-anchor="middle">🎶 Festzelt · Live-Band</text>

<!-- ============ ORTSNAMEN ============ -->
<text x="275" y="72" font-size="15" fill="#3a2e1f" font-weight="700" text-anchor="middle" opacity="0.85">Pfäffikon ZH</text>
<text x="108" y="498" font-size="13" fill="#3a2e1f" font-weight="600" text-anchor="middle" opacity="0.8">Seegräben</text>
<text x="590" y="568" font-size="12" fill="#3a2e1f" font-weight="600" text-anchor="middle" opacity="0.75">Auslikon</text>
<text x="390" y="918" font-size="15" fill="#3a2e1f" font-weight="700" text-anchor="middle" opacity="0.85">Wetzikon</text>
<!-- Büelweid / Irgenhausen -->
<text x="590" y="345" font-size="11" fill="#5a4a2a" font-style="italic" text-anchor="middle" opacity="0.7">Irgenhausen</text>

<!-- ============ LEGENDE ============ -->
<rect x="18" y="18" width="220" height="112" rx="10" fill="white" opacity="0.88"/>
<text x="30" y="40" font-size="13" fill="#7a2415" font-weight="800">8. ZüriOberländer</text>
<text x="30" y="57" font-size="13" fill="#7a2415" font-weight="800">Bierwanderung 2026</text>
<!-- Wanderroute -->
<line x1="30" y1="76" x2="60" y2="76" stroke="#7a2415" stroke-width="4" stroke-linecap="round"/>
<text x="68" y="80" font-size="11" fill="#3a2e1f">Wanderroute (zu Fuss)</text>
<!-- Bootsroute -->
<line x1="30" y1="96" x2="60" y2="96" stroke="#1e4a6e" stroke-width="3" stroke-dasharray="8,5"/>
<text x="68" y="100" font-size="11" fill="#3a2e1f">Booti (CHF 15.–)</text>
<!-- Stationen -->
<circle cx="43" cy="117" r="10" fill="#7a2415"/>
<text x="43" y="121" font-size="9" fill="#fff" font-weight="800" text-anchor="middle">1</text>
<text x="68" y="121" font-size="11" fill="#3a2e1f">Bierstationen (1–7)</text>

<!-- ============ KOMPASS ============ -->
<g transform="translate(668, 52)">
  <circle cx="0" cy="0" r="22" fill="white" opacity="0.85"/>
  <polygon points="0,-18 5,0 0,4 -5,0" fill="#7a2415"/>
  <polygon points="0,18 5,0 0,-4 -5,0" fill="#ccc"/>
  <text x="0" y="-22" font-size="10" fill="#3a2e1f" font-weight="700" text-anchor="middle">N</text>
</g>

</svg>
