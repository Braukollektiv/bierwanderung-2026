<rect x="492" y="182" width="145" height="48" rx="6" fill="white" opacity="0.88"/>
<text x="564" y="199" font-size="12" fill="#7a2415" font-weight="700" text-anchor="middle">Brüll Bier</text>
<text x="564" y="216" font-size="10" fill="#5a4a2a" text-anchor="middle">Pfäffikon am See</text>

