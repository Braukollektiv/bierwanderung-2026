<circle cx="500" cy="405" r="22" fill="#7a2415" filter="url(#shadow)"/>
<circle cx="500" cy="405" r="22" fill="none" stroke="#fff" stroke-width="2.5"/>
<text x="500" y="412" font-size="17" fill="#fff" font-weight="800" text-anchor="middle">3</text>
<!-- Label -->
<rect x="528" y="382" width="165" height="48" rx="6" fill="white" opacity="0.88"/>
<text x="610" y="399" font-size="12" fill="#7a2415" font-weight="700" text-anchor="middle">Milchhüsli</text>
<text x="610" y="416" font-size="10" fill="#5a4a2a" text-anchor="middle">Büelweid, Irgenhausen</text>

