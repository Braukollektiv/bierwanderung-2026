<text x="85" y="566" font-size="10" fill="#5a4a2a" text-anchor="middle">Schiffstation Seegräben</text>
<text x="85" y="579" font-size="9" fill="#1e4a6e" text-anchor="middle">⛵ per Booti erreichbar</text>

<!-- STATION 5 — Seebueb -->
<circle cx="490" cy="510" r="22" fill="#7a2415" filter="url(#shadow)"/>
<circle cx="490" cy="510" r="22" fill="none" stroke="#fff" stroke-width="2.5"/>
<text x="490" y="517" font-size="17" fill="#fff" font-weight="800" text-anchor="middle">5</text>
<!-- Label -->
<rect x="518" y="488" width="160" height="48" rx="6" fill="white" opacity="0.88"/>
